<header>
  <div class="content">
    <div id="rules">
      <a href="#"><img src="assets/rules-icon.png" width="24" height="24" alt="Rules"></a>
    </div><div id="logo">
    <img src="assets/cluevie-icon.png" width="25" height="25" alt="Cluevie Logo"> Cluevie
  </div><div id="stats">
    <a href="#"><img src="assets/stats-icon.png" width="22" height="20" alt="Stats"></a>
  </div>
  </div>
</header>
<div fxLayout="row" fxLayoutAlign="center center">
  <div fxLayout="column" fxFlex="80">
    <quiz-details></quiz-details>
    <movie-search *ngIf="result.outcome != 0 && result.outcome != 1"></movie-search>
    <final-score *ngIf="result.outcome == 0 || result.outcome == 1"></final-score>
    <score-counter></score-counter>
    <clues></clues>
    <mat-divider></mat-divider>
    <guess></guess>
  </div>
</div>
