<div class="score">
  <div class="scoreBox" *ngFor="let point of result.points">
    <img src="assets/incorrect.png" width="30" height="30" alt="Incorrect" *ngIf="point.style == 1">
    <img src="assets/clue.png" width="30" height="30" alt="Incorrect" *ngIf="point.style == 2">
    <img src="assets/correct.png" width="30" height="30" alt="Incorrect" *ngIf="point.style == 0">
  </div>
</div>
